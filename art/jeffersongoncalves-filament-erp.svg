<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0B"/>
      <stop offset="1" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#FBBF24" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#27272A" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>
  <ellipse cx="950" cy="310" rx="410" ry="290" fill="url(#glow)"/>

  <!-- Top label -->
  <circle cx="82" cy="66" r="4" fill="#FBBF24"/>
  <text x="100" y="71" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#A1A1AA">FILAMENT PLUGIN</text>

  <!-- Title -->
  <text x="80" y="270" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#FAFAFA">Laravel ERP</text>

  <!-- Tagline -->
  <text x="80" y="326" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#FBBF24">The complete ERP, as one Filament panel</text>

  <!-- Description -->
  <text x="80" y="366" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#A1A1AA">Bundles all 13 ERP modules — accounting, stock, selling, buying,</text>
  <text x="80" y="390" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#A1A1AA">manufacturing, assets, CRM, projects and more — into one panel plugin.</text>

  <!-- Right visual: stacked-cards -->
  <g transform="translate(845, 300)">
    <g transform="rotate(-10)">
      <rect x="-150" y="-95" width="300" height="190" rx="16" fill="#18181B" stroke="#27272A" stroke-width="1.5"/>
    </g>
    <g transform="rotate(-5)">
      <rect x="-150" y="-95" width="300" height="190" rx="16" fill="#1C1C20" stroke="#3F3F46" stroke-width="1.5"/>
    </g>
    <g>
      <rect x="-150" y="-95" width="300" height="190" rx="16" fill="url(#amber)"/>
      <rect x="-126" y="-66" width="120" height="14" rx="7" fill="#0A0A0B" opacity="0.85"/>
      <rect x="-126" y="-38" width="200" height="10" rx="5" fill="#0A0A0B" opacity="0.45"/>
      <rect x="-126" y="-20" width="170" height="10" rx="5" fill="#0A0A0B" opacity="0.45"/>
      <rect x="-126" y="14" width="90" height="26" rx="6" fill="#0A0A0B" opacity="0.75"/>
      <rect x="-26" y="14" width="90" height="26" rx="6" fill="#0A0A0B" opacity="0.35"/>
      <rect x="-126" y="52" width="240" height="10" rx="5" fill="#0A0A0B" opacity="0.4"/>
    </g>
  </g>

  <!-- Footer pills -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">
    <rect x="80" y="545" width="92" height="30" rx="15" fill="#18181B" stroke="#27272A"/>
    <text x="126" y="565" fill="#A1A1AA" text-anchor="middle">PHP 8.2+</text>
    <rect x="180" y="545" width="118" height="30" rx="15" fill="#18181B" stroke="#FBBF24"/>
    <text x="239" y="565" fill="#FBBF24" text-anchor="middle">Filament v5</text>
    <rect x="306" y="545" width="110" height="30" rx="15" fill="#18181B" stroke="#27272A"/>
    <text x="361" y="565" fill="#A1A1AA" text-anchor="middle">13 modules</text>
    <rect x="424" y="545" width="56" height="30" rx="15" fill="#18181B" stroke="#27272A"/>
    <text x="452" y="565" fill="#A1A1AA" text-anchor="middle">MIT</text>
  </g>

  <!-- Username -->
  <text x="1120" y="595" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#52525B" text-anchor="end">@jeffersongoncalves</text>
</svg>
